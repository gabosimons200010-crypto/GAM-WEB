name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: gamarra
          POSTGRES_PASSWORD: gamarra
          POSTGRES_DB: gamarra_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U gamarra"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://gamarra:gamarra@localhost:5432/gamarra_test?schema=public

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile=false

      - name: Generate Prisma Client
        run: pnpm --filter @gamarra/api prisma:generate

      - name: Validate Prisma schema
        run: pnpm --filter @gamarra/api exec prisma validate

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test (cobertura)
        run: pnpm test

      - name: Build
        run: pnpm build

  # El despliegue a staging (auto) y producción (aprobación manual) se añade
  # cuando exista el entorno de hosting (ver docs/07-infraestructura.md §7.3).
